max_steps: 60_000
save_iterations: [30_000, 60_000]
output: outputs/mc_street/cells

data:
  path: data/MatrixCity/street
  parser:
    class_path: surf_recon.modeling.block_colmap_parser.BlockDepthColmap
    init_args:
      partition_info_dir: outputs/mc_street/partition_info
      split_mode: experiment
      eval_image_select_mode: list
      eval_list: data/MatrixCity/street/val_images.txt
model:
  background_color: [1.0, 1.0, 1.0]
  renderer_output_types: [rgb, depth, normal]
  initialize_from: outputs/mc_street/partition_info/gaussians.ply
  gaussian:
    class_path: surf_recon.modeling.mesh_gaussian.MeshGaussian
    init_args:
      optimization:
        optimizer:
          class_path: surf_recon.modeling.selective_adam.SelectiveAdam
        means_lr_init: 1.6e-5
        means_lr_scheduler:
          lr_final: 1.6e-6
          max_steps: 60_000
  renderer:
    class_path: surf_recon.modeling.renderers.MeshBindedRenderer
  metric:
    class_path: surf_recon.modeling.metrics.DepthMeshRegularizedMetrics
    init_args:
      lambda_dn: 0.1
      dn_from_iter: 0
      mesh_regularization_schedule:
        start_iter: 50_000
        reset_occupancy_stop_iter: 55_000
      depth_loss_weight:
        init: 1.0
        final_factor: 0.1
  density:
    class_path: surf_recon.modeling.density_controllers.depth_guided_densifier.DepthGuidedDensityController
    init_args:
      start_trim_ratio: 0.75
      densify_from_iter: 1_000
      densify_until_iter: 30_000
      densification_interval: 1000
      densify_grad_threshold: 7.5e-5
      guided_densify_ratio: 0.0
      opacity_reset_interval: 10_000
      cull_opacity_threshold: 0.05
      percent_dense: 2e-3
