max_steps: 30_000
save_iterations: [15_000, 30_000]

data:
  path: data/GauU_Scene/CUHK_UPPER_CAMPUS
  parser:
    class_path: internal.dataparsers.Colmap
    init_args:
      split_mode: experiment
      eval_image_select_mode: ratio
      eval_ratio: 0.1
  train_max_num_images_to_cache: -1
  num_workers: 6
  async_caching: true

model:
  gaussian:
    class_path: surf_recon.modeling.mesh_gaussian.MeshGaussian
    init_args:
      optimization:
        means_lr_init: 6.4e-5
        means_lr_scheduler:
          lr_final: 6.4e-7
          max_steps: 30_000
  renderer:
    class_path: surf_recon.modeling.renderers.MeshBindedRenderer
  metric:
    class_path: surf_recon.modeling.metrics.MeshRegularizedMetrics
    init_args:
      mesh_regularization_schedule:
        start_iter: 20_000
        reset_occupancy_stop_iter: 25_000
  density:
    class_path: surf_recon.modeling.density_controllers.MeshGaussianDensityController
    init_args:
      densification_interval: 100
      opacity_reset_interval: 3000
      densify_until_iter: 15_000
