max_steps: 30_000
save_iterations: [15_000, 30_000]
output: outputs/cuhk_upper/cells

data:
  path: data/GauU_Scene/CUHK_UPPER_CAMPUS
  parser:
    class_path: surf_recon.modeling.block_colmap_parser.BlockDepthColmap
    init_args:
      partition_info_dir: outputs/cuhk_upper/partition_info
      split_mode: experiment
      eval_image_select_mode: list
      eval_list: data/GauU_Scene/CUHK_UPPER_CAMPUS/val_images.txt
  train_max_num_images_to_cache: -1
  num_workers: 6
  async_caching: true

model:
  renderer_output_types: [rgb, depth, normal]
  initialize_from: outputs/cuhk_upper/partition_info/gaussians.ply
  gaussian:
    class_path: surf_recon.modeling.mesh_gaussian.MeshGaussian
    init_args:
      optimization:
        means_lr_init: 6.4e-6
        means_lr_scheduler:
          lr_final: 6.4e-7
          max_steps: 30_000
  renderer:
    class_path: surf_recon.modeling.renderers.MeshBindedRenderer
  metric:
    class_path: surf_recon.modeling.metrics.DepthMeshRegularizedMetrics
    init_args:
      mesh_regularization_schedule:
        start_iter: 20_000
        reset_occupancy_stop_iter: 25_000
      depth_loss_weight:
        init: 0.5
  density:
    class_path: surf_recon.modeling.density_controllers.depth_guided_densifier.DepthGuidedDensityController
    init_args:
      densification_interval: 200
      cull_opacity_threshold: 0.05
      guided_densify_ratio: 0.05