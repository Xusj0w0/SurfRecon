max_steps: 60_000
save_iterations: [30_000, 60_000]
output: outputs/mc_aerial/cells

data:
  path: data/MatrixCity/aerial
  parser:
    class_path: surf_recon.modeling.block_colmap_parser.BlockDepthColmap
    init_args:
      partition_info_dir: outputs/mc_aerial/partition_info
      split_mode: experiment
      eval_image_select_mode: list
      eval_list: data/MatrixCity/aerial/val_images.txt

model:
  # background_color: [0.25, 0.25, 0.25]
  renderer_output_types: [rgb, depth, normal]
  initialize_from: outputs/mc_aerial/partition_info/gaussians.ply
  gaussian:
    class_path: surf_recon.modeling.mesh_gaussian.MeshGaussian
    init_args:
      optimization:
        means_lr_init: 1.6e-5
        means_lr_scheduler:
          lr_final: 6.4e-7
          max_steps: 60_000
  renderer:
    class_path: surf_recon.modeling.renderers.MeshBindedRenderer
  metric:
    class_path: surf_recon.modeling.metrics.DepthMeshRegularizedMetrics
    init_args:
      mesh_regularization_schedule:
        start_iter: 40_000
        reset_occupancy_stop_iter: 50_000
      depth_loss_type: ssim
      depth_loss_weight:
        init: 0.5
  density:
    class_path: surf_recon.modeling.density_controllers.depth_guided_densifier.DepthGuidedDensityController
    init_args:
      start_trim_ratio: 0.75
      densify_from_iter: 1_000
      densify_until_iter: 30_000
      densification_interval: 500
      opacity_reset_interval: 6000
      gt_depth_guided_until_iter: 15_000
      trim_from_iter: 3000
      trim_interval: 3000
