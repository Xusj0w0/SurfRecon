max_steps: 60_000
save_iterations: [30_000, 60_000]

data:
  path: data/MatrixCity/aerial
  parser:
    class_path: internal.dataparsers.Colmap
    init_args:
      split_mode: experiment
      eval_image_select_mode: list
      eval_list: data/MatrixCity/aerial/val_images.txt

model:
  background_color: [0.200000, 0.227451, 0.274510]
  gaussian:
    class_path: surf_recon.modeling.mesh_gaussian.MeshGaussian
    init_args:
      optimization:
        means_lr_init: 6.4e-5
        means_lr_scheduler:
          lr_final: 6.4e-7
          max_steps: 60_000
  renderer:
    class_path: surf_recon.modeling.renderers.MeshBindedRenderer
  metric:
    class_path: surf_recon.modeling.metrics.MeshRegularizedMetrics
    init_args:
      mesh_regularization_schedule:
        start_iter: 40_000
        reset_occupancy_stop_iter: 50_000
  density:
    class_path: surf_recon.modeling.density_controller.MeshGaussianDensityController
    init_args:
      densify_grad_threshold: 2e-4
      densification_interval: 200
      opacity_reset_interval: 6000
      densify_until_iter: 30_000